<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shikimori-Chan Top Up | Murah & Cepat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --pink-shikimori: #ffb7c5; --dark-bg: #1a1a1d; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background: var(--pink-shikimori); color: #000; font-weight: bold; }
        .card-custom { background: #252529; border: 1px solid var(--pink-shikimori); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .btn-buy { background: var(--pink-shikimori); color: #000; font-weight: bold; width: 100%; border-radius: 10px; }
        .status-success { color: #00ff88; font-weight: bold; display: none; text-align: center; margin-top: 15px; }
        .footer-admin { background: #111; padding: 20px; margin-top: 50px; border-top: 2px solid var(--pink-shikimori); font-size: 0.8rem; }
        input, select { background: #333 !important; color: white !important; border: 1px solid #444 !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg px-3">
  <span class="navbar-brand">🌸 Shikimori-Chan Top Up</span>
</nav>

<div class="container mt-4">
    <div class="card-custom">
        <h5>1. Pilih Game & Nominal</h5>
        <select class="form-select mb-3" id="gameSelect">
            <option value="Mobile Legends">Mobile Legends (MLBB)</option>
            <option value="Free Fire">Free Fire (FF)</option>
            <option value="Pubg Mobile">PUBG Mobile</option>
        </select>
        <input type="text" class="form-control mb-2" id="userId" placeholder="Masukkan ID (Contoh: 12345678)">
        <input type="text" class="form-control mb-3" id="serverId" placeholder="Masukkan Server (ML Only)">
        
        <select class="form-select" id="nominal">
            <option value="5">5 Diamonds - Rp 1.500</option>
            <option value="86">86 Diamonds - Rp 20.000</option>
            <option value="172">172 Diamonds - Rp 40.000</option>
        </select>
    </div>

    <div class="card-custom">
        <h5>2. Metode Pembayaran</h5>
        <div class="form-check mb-2">
            <input class="form-check-input" type="radio" name="pay" id="qris" checked>
            <label class="form-check-label">QRIS / DANA (Otomatis)</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" name="pay" id="bank">
            <label class="form-check-label">Transfer Bank (Manual)</label>
        </div>
    </div>

    <button class="btn btn-buy py-3" onclick="prosesTopUp()">BELI SEKARANG 🚀</button>

    <div id="notifSukses" class="status-success card-custom">
        <p>✅ PEMBAYARAN BERHASIL!</p>
        <p>Diamond Sedang Masuk ke ID: <span id="displayId"></span></p>
        <hr>
        <small>Order ID: <span id="orderNum"></span></small>
    </div>
</div>

<div class="footer-admin text-center">
    <h6>Pusat Bantuan & Admin</h6>
    <p>WhatsApp Admin: <a href="https://wa.me/628123456789" style="color: var(--pink-shikimori);">0812-XXXX-XXXX</a></p>
    <p>Jam Kerja: 08.00 - 22.00 WIB</p>
    <p>&copy; 2026 Shikimori-Chan Top Up - Created by Hiro</p>
</div>

<script>
    function prosesTopUp() {
        const id = document.getElementById('userId').value;
        if(id === "") return alert("Isi ID Dulu, Hiro!");

        // Simulasi Generate Order ID
        const orderId = "SHK-" + Math.floor(Math.random() * 900000 + 100000);
        
        // Animasi Loading Ceritanya
        alert("Menghubungkan ke Server Payment...");

        setTimeout(() => {
            document.getElementById('displayId').innerText = id;
            document.getElementById('orderNum').innerText = orderId;
            document.getElementById('notifSukses').style.display = "block";
            
            // Scroll otomatis ke bukti bayar
            window.scrollTo(0, document.body.scrollHeight);
        }, 2000);
    }
</script>

</body>
</html>
