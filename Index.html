<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shikimori-Chan Top Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --pink-shikimori: #ffb7c5; --dark-bg: #1a1a1d; }
        body { background-color: var(--dark-bg); color: white; font-family: sans-serif; }
        .navbar { background: var(--pink-shikimori); color: #000; padding: 10px 15px; }
        .card-custom { background: #252529; border: 1px solid var(--pink-shikimori); border-radius: 15px; padding: 20px; margin-top: 20px; }
        
        /* Overlay Login Google */
        .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-btn { background: white; color: black; padding: 10px 20px; border-radius: 10px; font-weight: bold; border: none; display: flex; align-items: center; gap: 10px; }

        .btn-buy { background: var(--pink-shikimori); color: #000; font-weight: bold; width: 100%; padding: 12px; border-radius: 10px; border: none; margin-top: 15px; }
        .dropdown-menu { background: #252529; border: 1px solid var(--pink-shikimori); }
        .dropdown-item { color: white; }
    </style>
</head>
<body>

<div id="loginPage" class="login-screen">
    <div class="text-center">
        <h4 class="mb-4">Shikimori-Chan Top Up</h4>
        <button class="login-btn" onclick="login()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/768px-Google_%22G%22_logo.svg.png" width="20">
            Login with Google
        </button>
    </div>
</div>

<nav class="navbar d-flex justify-content-between">
    <span class="fw-bold">🌸 Shikimori-Chan Top Up</span>
    <div class="dropdown">
        <i class="bi bi-three-dots-vertical" id="dropMenu" data-bs-toggle="dropdown" style="font-size: 1.5rem; cursor: pointer;"></i>
        <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="#"><i class="bi bi-person"></i> Akun Saya</a></li>
            <li><a class="dropdown-item" href="#"><i class="bi bi-wallet2"></i> Riwayat Saldo</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="javascript:location.reload()">Logout</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="card-custom">
        <h5>1. Masukkan ID & Server</h5>
        <input type="text" class="form-control mb-2" id="uid" placeholder="User ID">
        <input type="text" class="form-control mb-3" id="zid" placeholder="Zone ID">
        
        <h5>2. Pilih Nominal</h5>
        <select class="form-select mb-3">
            <option>172 Diamonds - Rp 40.000</option>
            <option>257 Diamonds - Rp 60.000</option>
        </select>
        
        <button class="btn-buy" onclick="beli()">BELI SEKARANG 🚀</button>
    </div>
</div>

<footer class="text-center mt-5 p-3" style="font-size: 0.8rem; border-top: 1px solid #333;">
    <p>Admin WA: 0812-XXXX-XXXX</p>
    <p>&copy; 2026 Dibuat oleh Hiro</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function login() {
        alert("Selamat Datang, Hiro!");
        document.getElementById('loginPage').style.display = 'none';
    }
    function beli() {
        if(!document.getElementById('uid').value) return alert("ID-nya diisi dulu sepuh!");
        alert("Orderan sedang diproses...");
    }
</script>

</body>
</html>
